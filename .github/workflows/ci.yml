name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`) so CI reconciles cross-platform optional-dep
      # drift the same way Vercel's build does. Tailwind 4's wasm fallback
      # (@tailwindcss/oxide-wasm32-wasi) pulls @emnapi/* transitive deps that a
      # Windows-generated lockfile omits, which makes strict `npm ci` fail on
      # Linux. --no-audit/--no-fund keep output clean; auditing is a separate step.
      - run: npm install --no-audit --no-fund

      # Task 6.1 — SG-03: fail on high+ vulnerabilities in PRODUCTION deps.
      # --omit=dev excludes build/test-only tooling (esbuild via vite/drizzle-kit/
      # tsx, etc.) whose advisories don't affect the shipped app; moderate
      # transitive advisories are tracked but not blocking.
      # See docs/SECURITY.md and docs/DEPENDENCIES.md for accepted risks.
      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          GEMINI_API_KEY: dummy-key-for-build

  # Task 6.5 — Playwright E2E (runs on PRs and weekly against staging)
  e2e:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      # See the build job: npm install reconciles cross-platform lockfile drift.
      - run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Visual-regression specs are excluded: they need baseline screenshots
      # generated in-environment and committed, which isn't set up yet. The
      # functional + a11y smoke flows run here.
      #
      # S6-M3 — authenticated flows: when the four E2E_CLERK_* repo secrets are
      # configured (Clerk DEVELOPMENT-instance keys + a dedicated test user;
      # see docs/E2E.md), the dev server boots with auth enabled and the specs
      # sign in via @clerk/testing instead of self-skipping. With the secrets
      # absent these env vars are empty strings → auth stays disabled → the
      # suite behaves exactly as before.
      - name: Run E2E tests
        run: npx playwright test --grep-invert "Visual regression"
        env:
          GEMINI_API_KEY: dummy-key-for-build
          BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
