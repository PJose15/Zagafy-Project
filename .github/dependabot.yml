version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Auto-merge patch updates for trusted packages via GitHub auto-merge
    # rules (configured in repo settings). PRs for minor/major updates
    # require manual review.
    labels:
      - dependencies
    commit-message:
      prefix: "deps"
    groups:
      # Group patch-level updates for faster review
      patch-updates:
        update-types:
          - patch
      # Group development dependency updates separately
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
